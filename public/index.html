<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JUNTAS — Ahorro grupal entre amigos</title>
    <style>
        :root {
            --bg: #0F1117;
            --card: #181B23;
            --text: #FFFFFF;
            --muted: #9CA3AF;
            --accent: #FFD166;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            max-width: 420px;
            width: 100%;
            background: var(--card);
            border-radius: 24px;
            padding: 40px 28px;
            text-align: center;
        }
        .logo {
            font-size: 42px;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 8px;
            letter-spacing: -1px;
        }
        .tagline {
            color: var(--muted);
            font-size: 15px;
            margin-bottom: 32px;
        }
        h1 {
            font-size: 22px;
            margin-bottom: 12px;
        }
        p {
            color: var(--muted);
            font-size: 15px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">JUNTAS</div>
        <div class="tagline">Ahorro grupal entre amigos</div>
        <h1>Bienvenido</h1>
        <p>Si recibiste un link de invitación a una junta, ábrelo desde tu celular con la app JUNTAS instalada.</p>
    </div>
</body>
</html>
